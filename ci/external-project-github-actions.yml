name: unicode-guard

on:
  pull_request:
  push:

jobs:
  unicode-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Unicode Guard from GitHub
        run: python -m pip install git+https://github.com/YOUR_USERNAME/unicode-guard.git
      - name: Scan this repository
        run: unicode-guard . --fail-on HIGH
